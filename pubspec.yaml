name: trouble_sarthi
description: "Trouble Sarthi Application."
publish_to: 'none'

version: 1.0.0+1

environment:
    sdk: ^3.8.1

dependencies:
    flutter:

        sdk: flutter

    # ── UI & Fonts ───────────────────────────────────────────────────────────
    font_awesome_flutter: ^10.7.0

    path_provider: ^2.1.2
    local_auth: ^3.0.0
    google_fonts: ^6.1.0
    cupertino_icons: ^1.0.8
    firebase_storage: ^12.4.10
    image_picker: ^1.1.2
    firebase_messaging: ^15.0.0    # ← ADD THIS
    flutter_local_notifications: ^18.0.0

    # ── Firebase ─────────────────────────────────────────────────────────────
    firebase_core: ^3.15.2
    firebase_auth: ^5.5.4
    cloud_firestore: ^5.4.3

    # ── Maps & Location ──────────────────────────────────────────────────────
    google_maps_flutter: ^2.9.0
    geolocator: ^13.0.1
    geocoding: ^3.0.0
    permission_handler: ^11.3.1

    # ── Utilities ────────────────────────────────────────────────────────────
    uuid: ^4.5.1
    get: ^4.6.6
    url_launcher: ^6.2.5
    google_sign_in: ^6.2.2
    shared_preferences: ^2.2.2
    flutter_facebook_auth: ^7.1.5

    # ── NEW: Add these two lines ─────────────────────────────────────────────
    connectivity_plus: ^6.1.4
    firebase_database: ^11.3.10
    cached_network_image: ^3.4.1

    pdf: ^3.11.0
    printing: ^5.13.0
    intl: ^0.19.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0
    flutter_launcher_icons: ^0.14.4

flutter:
    uses-material-design: true
    assets:
        - assets/images/
        - assets/fonts/SAMAN___.TTF


    fonts:
        - family: Saman
          fonts:
              - asset: assets/fonts/SAMAN___.ttf

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/icon/icon.png"
    min_sdk_android: 21