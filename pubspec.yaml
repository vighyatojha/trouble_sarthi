name: trouble_sarthi
description: "Trouble Sarthi Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Fonts ───────────────────────────────────────────────────────────
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

  # ── Firebase ─────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.4        # ← ADD THIS (for login/signup)
  cloud_firestore: ^5.4.3

  # ── Maps & Location ──────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # ── Utilities ────────────────────────────────────────────────────────────
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/            # ← ADD THIS

  fonts:
    - family: Saman
      fonts:
        - asset: assets/fonts/SAMAN___.ttf